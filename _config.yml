image_fulls_loc: "/images/fulls"
image_thumbs_loc: "/images/thumbs"
google_analytics: ""

# UI configs
title: "Lila Nantara | Portfolio photo"
subtitle: "Lumières de fin de journée, villes, ports et horizons calmes"
author: "Lila Nantara"
header:
 title: "Lila Nantara"
 subtitle: "Portfolio photo"
footer:
 name: "À propos"
 bio: "Je photographie les lumières de fin de journée, les scènes urbaines, les ports et les paysages calmes. Ce portfolio rassemble une sélection d'images choisies pour leur ambiance et leur simplicité."

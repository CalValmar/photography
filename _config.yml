# Base configs
baseurl: "/photography"
# baseurl: "" # Comment the above line and uncomment this to test the website locally
image_fulls_loc: "/images/fulls"
image_thumbs_loc: "/images/thumbs"
google_analytics: ""

# UI configs
title: "Lila Nantara | Portfolio photo"
subtitle: "Lumières de fin de journée, villes, ports et horizons calmes"
author: "Lila Nantara"
header:
 title: "Lila Nantara"
 subtitle: "Portfolio photo"
footer:
 name: "À propos de Lila"
 bio: "Lila Nantara est une artiste qui perçoit et célèbre la beauté et l’amour dans chaque moment et objet qui nous rappellent l’éphémérité et l’insouciance de la vie."
